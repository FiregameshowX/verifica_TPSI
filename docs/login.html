<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Login - E-Commerce</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUA..." type="image/png">
</head>
<body>
  <h1>Login E-Commerce</h1>

  <div>
    <label for="username">Username:</label>
    <input type="text" id="username" placeholder="Inserisci username">
  </div>

  <div>
    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Inserisci password">
  </div>

  <button id="btnLogin">Login</button>

  <p id="loginMsg" style="color:red;"></p>

  <script>
    const backendURL = "https://verifica-tpsi.onrender.com";

    document.getElementById("btnLogin").addEventListener("click", () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("loginMsg");
      msg.textContent = "";

      if(!username || !password){
        msg.textContent = "Compila tutti i campi!";
        return;
      }

      fetch(`${backendURL}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      })
      .then(res => res.json())
      .then(data => {
        if(data.error) {
          msg.textContent = data.error;
        } else {
          // Salva utente loggato in localStorage
          localStorage.setItem("currentUser", JSON.stringify(data));

          if(data.isAdmin) window.location.href = "admin.html";
          else window.location.href = "user.html";
        }
      })
      .catch(err => { msg.textContent = "Errore server"; });
    });
  </script>
</body>
</html>
