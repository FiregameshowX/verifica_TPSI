<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Vista Admin - E-Commerce</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUA..." type="image/png">
</head>
<body>
  <h1>Dashboard Admin</h1>

  <h2>Prodotti</h2>
  <ul id="products"></ul>

  <h2>Aggiungi Prodotto</h2>
  <input type="text" id="prodName" placeholder="Nome">
  <input type="number" id="prodPrice" placeholder="Prezzo">
  <input type="number" id="prodStock" placeholder="Stock">
  <button id="btnAddProduct">Aggiungi Prodotto</button>

  <h2>Aggiungi Crediti Utente</h2>
  <select id="userSelect"></select>
  <input type="number" id="creditsToAdd" placeholder="Crediti">
  <button id="btnAddCredits">Aggiungi Crediti</button>

  <!-- Tutto il JS esterno -->
  <script src="script.js"></script>
</body>
</html>
